<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trigu's Bakery - Pedidos de Tortas Personalizadas</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
    }
    main {
      width: 100%;
      max-width: 768px;
      background: #ffffff;
      line-height: 0;
    }
    picture, img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      border: 0;
    }
  </style>
</head>
<body>
  <main aria-label="Formulario de pedidos de tortas personalizadas Trigu's Bakery">
    <picture>
      <source srcset="assets/page-1.webp" type="image/webp" />
      <img src="assets/page-1.jpg" alt="Página 1 del formulario de pedidos de tortas personalizadas: datos del pedido y selección de peso." />
    </picture>
    <picture>
      <source srcset="assets/page-2.webp" type="image/webp" />
      <img src="assets/page-2.jpg" alt="Página 2 del formulario: distribución, sabor del ponque y sabor del relleno." />
    </picture>
    <picture>
      <source srcset="assets/page-3.webp" type="image/webp" />
      <img src="assets/page-3.jpg" alt="Página 3 del formulario: tipo de cobertura, toppings, adjuntar foto y mensaje final." />
    </picture>
  </main>
</body>
</html>
